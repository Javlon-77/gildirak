<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Omad G'ildiragi 🎡</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #090d16;
            --card-bg: #111827;
            --accent-color: #f59e0b;
            --text-color: #f3f4f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        /* --- FOYDALANUVChI REJIMIDAGI DIZAYN --- */
        #userView {
            display: none;
            width: 100%;
            max-width: 360px;
        }

        .register-card {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .register-card h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: #10b981;
        }

        .register-card p {
            color: #9ca3af;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            background-color: #090d16;
            border: 2px solid #374151;
            border-radius: 6px;
            padding: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
            margin-bottom: 16px;
            text-align: center;
        }

        input:focus {
            border-color: #10b981;
        }

        input:disabled {
            background-color: #1f2937;
            color: #9ca3af;
            cursor: not-allowed;
            border-color: #4b5563;
        }

        .reg-btn {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .reg-btn:disabled {
            background: #374151;
            color: #6b7280;
            cursor: not-allowed;
        }

        .status {
            margin-top: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            min-height: 20px;
        }

        /* --- ADMIN REJIMIDAGI DIZAYN --- */
        #adminView {
            display: none;
            width: 100%;
            max-width: 900px;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (min-width: 768px) {
            .main-container {
                flex-direction: row;
                padding: 30px;
                gap: 35px;
            }
        }

        .wheel-section {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 340px;
        }

        @media (min-width: 768px) {
            .wheel-section {
                max-width: 380px;
            }
        }

        .pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 26px solid #ef4444;
            z-index: 10;
        }

        canvas {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 1 / 1;
            box-shadow: 0 0 0 6px #1f2937;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        .center-circle {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-weight: bold;
            color: #090d16;
            font-size: 0.85rem;
            user-select: none;
            z-index: 5;
            border: 3px solid #1f2937;
        }

        .control-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            flex: 1;
        }

        h1 {
            font-size: 1.5rem;
            color: #f59e0b;
            font-weight: 700;
        }

        .active-count {
            font-size: 1rem;
            color: #10b981;
            font-weight: 600;
            margin-top: 2px;
        }

        .spin-btn {
            background: #f59e0b;
            color: #090d16;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .spin-btn:disabled {
            background: #374151;
            color: #6b7280;
            cursor: not-allowed;
        }

        .reset-btn {
            background-color: #374151;
            color: #f3f4f6;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .reset-btn:hover { background-color: #ef4444; }

        .podium-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px 6px;
            min-height: 120px;
        }

        .podium-place { display: flex; flex-direction: column; align-items: center; width: 30%; }
        .podium-name { font-size: 0.8rem; font-weight: bold; text-align: center; margin-bottom: 6px; min-height: 18px; color: #9ca3af; word-break: break-all; }
        .podium-block { width: 100%; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; font-weight: bold; border-radius: 4px 4px 0 0; color: #090d16; }

        .place-2 .podium-block { height: 40px; background: #cbd5e1; }
        .place-1 .podium-block { height: 65px; background: #fcd34d; }
        .place-3 .podium-block { height: 25px; background: #f97316; }

        .current-status { text-align: center; font-weight: bold; color: #60a5fa; font-size: 1rem; min-height: 24px; }
    </style>
</head>
<body>

<!-- FOYDALANUVCHILAR REJIMI -->
<div id="userView">
    <div class="register-card">
        <h1>Omad G'ildiragi</h1>
        <p>Ismingizni kiriting va ro'yxatdan o'ting!</p>
        <input type="text" id="userName" placeholder="Ismingiz..." required>
        <button class="reg-btn" onclick="registerName()">Qo'shilish 🚀</button>
        <div class="status" id="statusMessage"></div>
    </div>
</div>

<!-- ADMIN REJIMI -->
<div id="adminView">
    <div class="main-container">
        <div class="wheel-section">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
            <div class="center-circle" onclick="startTournament()">GO!</div>
        </div>

        <div class="control-section">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h1>Omad G'ildiragi</h1>
                    <div class="active-count" id="countDisplay">Ishtirokchilar: 0 ta</div>
                </div>
                <button class="reset-btn" onclick="clearDatabase()">Tozalash</button>
            </div>

            <button class="spin-btn" id="spinBtn" onclick="startTournament()">G'ildirakni aylantirish 🏆</button>
            <div class="current-status" id="statusBox">Ismlar kutilmoqda...</div>

            <div class="podium-container">
                <div class="podium-place place-2">
                    <div class="podium-name" id="name-2">-</div>
                    <div class="podium-block">2</div>
                </div>
                <div class="podium-place place-1">
                    <div class="podium-name" id="name-1">-</div>
                    <div class="podium-block">1</div>
                </div>
                <div class="podium-place place-3">
                    <div class="podium-name" id="name-3">-</div>
                    <div class="podium-block">3</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const DATABASE_URL = "https://gildirak-63c96-default-rtdb.firebaseio.com/";
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');

    if (mode === 'admin') {
        document.getElementById('adminView').style.display = 'block';
        initAdminLogic();
    } else {
        document.getElementById('userView').style.display = 'block';
        initUserLogic();
    }

    // FOYDALANUVCHI CHEKLOVI VA SINXRONIZATSIYASI
    function initUserLogic() {
        const statusDiv = document.getElementById('statusMessage');
        const nameInput = document.getElementById('userName');
        const regBtn = document.querySelector('.reg-btn');

        setInterval(async () => {
            try {
                const response = await fetch(`${DATABASE_URL}resetToken.json`);
                const serverToken = await response.json();
                const localToken = localStorage.getItem('wheel_reset_token');

                if (serverToken && serverToken !== localToken) {
                    localStorage.removeItem('hasRegisteredWheel');
                    localStorage.removeItem('wheel_reset_token');
                    nameInput.disabled = false;
                    regBtn.disabled = false;
                    statusDiv.innerText = "";
                }
            } catch (e) { console.error(e); }
        }, 2000);

        if (localStorage.getItem('hasRegisteredWheel') === 'true') {
            nameInput.disabled = true;
            regBtn.disabled = true;
            statusDiv.style.color = "#10b981";
            statusDiv.innerText = "Siz allaqachon qo'shilgansiz! 🎉 Katta ekranni kuzating.";
        }

        window.registerName = async function() {
            const name = nameInput.value.trim();
            if (name === "") { alert("Iltimos, ismingizni yozing!"); return; }

            if (localStorage.getItem('hasRegisteredWheel') === 'true') {
                alert("Siz faqat bir marta ro'yxatdan o'ta olasiz!");
                return;
            }

            statusDiv.style.color = "#60a5fa";
            statusDiv.innerText = "Yuborilmoqda...";

            try {
                const tokenRes = await fetch(`${DATABASE_URL}resetToken.json`);
                const currentToken = await tokenRes.json();

                const response = await fetch(`${DATABASE_URL}participants.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, timestamp: Date.now() })
                });

                if (response.ok) {
                    localStorage.setItem('hasRegisteredWheel', 'true');
                    if (currentToken) localStorage.setItem('wheel_reset_token', currentToken);

                    statusDiv.style.color = "#10b981";
                    statusDiv.innerText = "Siz muvaffaqiyatli qo'shildingiz! 🎉";
                    nameInput.value = "";
                    nameInput.disabled = true;
                    regBtn.disabled = true;
                } else { throw new Error(); }
            } catch (error) {
                statusDiv.style.color = "#ef4444";
                statusDiv.innerText = "Xatolik! Qayta urinib ko'ring.";
            }
        };
    }

    // ADMIN BOSHQARUVI, CANVAS VA AUDIO EFEKTLAR
    function initAdminLogic() {
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const statusBox = document.getElementById('statusBox');
        const countDisplay = document.getElementById('countDisplay');

        const colors = ['#f59e0b', '#3b82f6', '#10b981', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#14b8a6'];

        window.participants = [];
        window.activeParticipants = [];
        window.currentRotation = 0;
        window.isSpinning = false;
        window.audioCtx = null;
        window.currentPlaceToDraw = 3;

        window.fetchParticipants = async function() {
            if (window.isSpinning) return; 
            try {
                const response = await fetch(`${DATABASE_URL}participants.json`);
                const data = await response.json();
                window.participants = data && typeof data === 'object' ? Object.values(data).map(item => item.name) : [];
                countDisplay.innerText = `Ishtirokchilar: ${window.participants.length} ta`;
                drawWheel();
            } catch (error) { console.error(error); }
        };

        window.clearDatabase = async function() {
            if (window.isSpinning) return;
            if (!confirm("Barcha ishtirokchilarni o'chirib tashlamoqchimisiz?")) return;

            try {
                await fetch(`${DATABASE_URL}participants.json`, { method: 'DELETE' });
                const newToken = "reset_" + Date.now();
                await fetch(`${DATABASE_URL}resetToken.json`, { method: 'PUT', body: JSON.stringify(newToken) });

                window.participants = [];
                window.activeParticipants = [];
                document.getElementById('name-1').innerText = '-';
                document.getElementById('name-2').innerText = '-';
                document.getElementById('name-3').innerText = '-';
                statusBox.innerText = "Ro'yxat tozalandi!";
                window.fetchParticipants();
            } catch (error) { alert("Xatolik yuz berdi"); }
        };

        function initAudio() {
            if (!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playTickSound() {
            initAudio();
            if (!window.audioCtx) return;
            const osc = window.audioCtx.createOscillator();
            const gain = window.audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(900, window.audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, window.audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.1, window.audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.05);
            osc.connect(gain); gain.connect(window.audioCtx.destination);
            osc.start(); osc.stop(window.audioCtx.currentTime + 0.05);
        }

        function playWinSound(place) {
            initAudio();
            if (!window.audioCtx) return;
            const freqs = place === 1 ? [523, 659, 783, 1046] : [392, 493, 587, 783];
            freqs.forEach((freq, index) => {
                setTimeout(() => {
                    const osc = window.audioCtx.createOscillator();
                    const gain = window.audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, window.audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.12, window.audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.35);
                    osc.connect(gain); gain.connect(window.audioCtx.destination);
                    osc.start(); osc.stop(window.audioCtx.currentTime + 0.35);
                }, index * 90);
            });
        }

        function drawWheel() {
            const list = window.isSpinning ? window.activeParticipants : window.participants;
            const numSegments = list.length;
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (numSegments === 0) {
                ctx.fillStyle = '#6b7280';
                ctx.font = '15px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText("Kutilmoqda...", radius, radius);
                return;
            }

            const arcSize = (2 * Math.PI) / numSegments;
            for (let i = 0; i < numSegments; i++) {
                const angle = i * arcSize;
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath(); ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, angle, angle + arcSize);
                ctx.closePath(); ctx.fill();

                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 13px sans-serif';
                let text = list[i];
                if (text.length > 11) text = text.substring(0, 9) + '...';
                ctx.fillText(text, radius - 15, 4);
                ctx.restore();
            }
        }

        window.startTournament = function() {
            if (window.isSpinning) return;
            if (window.participants.length < 3) { alert("Kamida 3 ta ishtirokchi kerak!"); return; }

            window.activeParticipants = [...window.participants];
            document.getElementById('name-1').innerText = '-';
            document.getElementById('name-2').innerText = '-';
            document.getElementById('name-3').innerText = '-';
            window.currentPlaceToDraw = 3;
            runSingleSpin();
        };

        function runSingleSpin() {
            window.isSpinning = true;
            spinBtn.disabled = true;
            statusBox.innerText = `🌀 ${window.currentPlaceToDraw}-o'rin aniqlanmoqda...`;

            const numSegments = window.activeParticipants.length;
            const arcSize = 360 / numSegments;
            const spinAngle = Math.floor(Math.random() * 360) + 1440;
            const targetRotation = window.currentRotation + spinAngle;
            
            const startTime = performance.now();
            const duration = 3500;
            let lastTickAngle = 0;

            function animate(timestamp) {
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const currentAngle = window.currentRotation + (spinAngle * easeOut);
                canvas.style.transform = `rotate(${currentAngle}deg)`;

                const segmentProgress = Math.floor(currentAngle / arcSize);
                if (segmentProgress !== lastTickAngle) {
                    playTickSound();
                    lastTickAngle = segmentProgress;
                }

                if (progress < 1) { requestAnimationFrame(animate); } else {
                    window.currentRotation = targetRotation % 360;
                    const normalizedAngle = (360 - (window.currentRotation % 360) + 270) % 360;
                    const winnerIndex = Math.floor(normalizedAngle / arcSize) % numSegments;
                    const winner = window.activeParticipants[winnerIndex];

                    document.getElementById(`name-${window.currentPlaceToDraw}`).innerText = winner;
                    playWinSound(window.currentPlaceToDraw);

                    if (typeof confetti === 'function') {
                        confetti({ particleCount: 50, spread: 45, origin: { y: 0.6 } });
                    }

                    window.activeParticipants.splice(winnerIndex, 1);
                    drawWheel();

                    setTimeout(() => {
                        if (window.currentPlaceToDraw > 1) {
                            window.currentPlaceToDraw--;
                            runSingleSpin();
                        } else {
                            statusBox.innerText = "🏆 Musobaqa yakunlandi! 🏆";
                            window.isSpinning = false;
                            spinBtn.disabled = false;
                        }
                    }, 1800);
                }
            }
            requestAnimationFrame(animate);
        }

        setInterval(window.fetchParticipants, 2000);
        window.fetchParticipants();
    }
</script>
</body>
</html>
